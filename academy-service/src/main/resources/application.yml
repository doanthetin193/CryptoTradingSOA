server:
  port: 3007

spring:
  application:
    name: academy-service

  datasource:
    url: jdbc:mysql://localhost:3306/crypto_academy?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        enabled: true
        service-name: academy-service
        health-check-path: /academy/health
        health-check-interval: 10s
        instance-id: academy-service-${server.port}
        prefer-ip-address: true
        fail-fast: false
      config:
        enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

youtube:
  api-key: ${YOUTUBE_API_KEY:your-youtube-api-key-here}
  playlist-id: ${YOUTUBE_PLAYLIST_ID:PLmkMeQXrAX47_ZwxjoPXDAqanx4-ady6O}
  base-url: https://www.googleapis.com/youtube/v3
  cache-ttl-hours: 24

logging:
  level:
    com.cryptotrading.academy: INFO
    org.springframework.web: WARN
